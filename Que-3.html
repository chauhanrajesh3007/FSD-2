<!-- write a script to store an array of 3 objects having name and age display name and age of person with the highest age -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>
        let obj=[{"name":"abc","age":10},{"name":"pqr","age":50},{"name":"xyz","age":22}]
        let oldperson=obj[0]
        for(i=1;i<obj.length;i++){
            if(obj[i].age>oldperson.age){
                oldperson=obj[i]
            }
        }
        console.log(oldperson)
    </script>
 </body>
 </html>
