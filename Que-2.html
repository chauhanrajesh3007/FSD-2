<!-- write a function first and last that text in an array and written an object the first element of array as object key and last element of array as that keys value -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>
        function FirstAndLast(array){
            let obj={}
            obj[array[0]]=array[array.length-1]
            return obj
            }
            let arr1=["abc","pqr","xyz","def"]
            console.log(FirstAndLast(arr1))
    </script>
 </body>
 </html>
